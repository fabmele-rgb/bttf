<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BTTF Orologio</title>
<style>
@font-face {
  font-family: 'DSEG7';
  src: url('https://cdn.jsdelivr.net/gh/keshikan/DSEG@v0.46/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2');
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; font-family:'Courier New', monospace; padding:6px; max-width:720px; margin:0 auto; }

/* SPEED */
.speed-box { text-align:center; margin-bottom:8px; padding:6px 4px; background:#0a0a0a; border:1px solid #333; border-radius:4px; }
.speed { font-size:clamp(28px,9vw,52px); font-weight:bold; color:#00ff44; letter-spacing:4px; font-family:'DSEG7','Courier New',monospace; }
.speed-label { font-size:11px; color:#ffb000; margin-top:2px; }
.countdown { text-align:center; color:#ff3300; font-size:10px; margin:4px 0 6px; letter-spacing:1px; }

/* PANNELLO */
.bttf-panel {
  background: linear-gradient(180deg, #5a5a5a 0%, #3a3a3a 15%, #2e2e2e 50%, #3a3a3a 85%, #4a4a4a 100%);
  border: 3px solid #666;
  border-radius: 6px;
  margin-bottom: 5px;
  padding: 6px 8px 5px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), inset 0 -1px 0 rgba(0,0,0,0.5), 0 3px 8px rgba(0,0,0,0.8);
}

.labels-row { display:flex; margin-bottom:4px; padding:0 2px; }
.label-cell { flex:1; text-align:center; }
.label-cell.year-cell { flex:1.6; }
.label-cell.ampm-cell { flex:0.45; }
.label-cell.small-cell { flex:0.85; }

.label-tag {
  display:inline-block; background:#5a0000; color:#ddd;
  font-size:clamp(6px,1.5vw,9px); font-weight:bold; letter-spacing:1px;
  padding:1px 4px; border:1px solid #800000; border-radius:2px; text-transform:uppercase;
}

.display-row { display:flex; align-items:center; gap:3px; }

.digit-box {
  flex:1; background:#000; border:2px solid #222; border-radius:3px;
  padding:4px 2px; text-align:center; box-shadow:inset 0 0 8px rgba(0,0,0,0.9);
}
.digit-box.year-box { flex:1.6; }
.digit-box.small-box { flex:0.85; }

/* FLICKER LED */
@keyframes flicker {
  0%,17%,19%,21%,23%,51%,57%,100% { opacity:1; }
  18% { opacity:0.2; }
  20% { opacity:0.9; }
  22% { opacity:0.1; }
  52% { opacity:0.3; }
  53% { opacity:1; }
  54% { opacity:0.2; }
  56% { opacity:1; }
}

.digit {
  font-family: 'DSEG7', 'Courier New', monospace;
  font-size: clamp(22px, 6vw, 42px);
  font-weight: bold;
  letter-spacing: 2px;
  line-height: 1;
  display: block;
  animation: flicker 7s infinite;
}
.red .digit { animation-delay: 0.1s; }
.green .digit { animation-delay: 0.5s; }
.amber .digit { animation-delay: 0.9s; }

.ampm-box { flex:0.45; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:0 2px; border-right:1px solid #333; }
.ampm-row { display:flex; align-items:center; gap:3px; }
.ampm-dot { width:clamp(6px,1.5vw,10px); height:clamp(6px,1.5vw,10px); border-radius:50%; border:1px solid #333; }
.ampm-label { font-size:clamp(7px,1.5vw,10px); font-weight:bold; color:#888; }

.colon-sep { display:flex; flex-direction:column; justify-content:center; align-items:center; gap:6px; padding:0 1px; }
.colon-dot { width:clamp(4px,1vw,6px); height:clamp(4px,1vw,6px); border-radius:50%; }

.panel-title { text-align:center; margin-top:5px; font-size:clamp(8px,2vw,11px); font-weight:bold; letter-spacing:clamp(2px,0.5vw,5px); color:#fff; text-transform:uppercase; background:rgba(0,0,0,0.3); padding:2px 0; border-top:1px solid #555; }

/* COLORI */
.red .digit { color:#ff3300; text-shadow:0 0 10px #ff3300, 0 0 20px #ff2200; }
.red .digit-box { background:#050000; }
.red .ampm-dot.on { background:#ff3300; box-shadow:0 0 6px #ff3300; border-color:#ff3300; }
.red .ampm-dot.off { background:#1a0000; }
.red .colon-dot { background:#ff3300; box-shadow:0 0 4px #ff3300; }
.red .label-tag { background:#5a0000; border-color:#800000; }

.green .digit { color:#00ff44; text-shadow:0 0 10px #00ff44, 0 0 20px #00dd33; }
.green .digit-box { background:#000500; }
.green .ampm-dot.on { background:#00ff44; box-shadow:0 0 6px #00ff44; border-color:#00ff44; }
.green .ampm-dot.off { background:#001a00; }
.green .colon-dot { background:#00ff44; box-shadow:0 0 4px #00ff44; }
.green .label-tag { background:#005a00; border-color:#008000; }

.amber .digit { color:#ffaa00; text-shadow:0 0 10px #ffaa00, 0 0 20px #ff8800; }
.amber .digit-box { background:#050200; }
.amber .ampm-dot.on { background:#ffaa00; box-shadow:0 0 6px #ffaa00; border-color:#ffaa00; }
.amber .ampm-dot.off { background:#1a0a00; }
.amber .colon-dot { background:#ffaa00; box-shadow:0 0 4px #ffaa00; }
.amber .label-tag { background:#5a3000; border-color:#804000; }

/* PULSANTI GRANDI */
.btn {
  border:2px solid; padding:18px 16px; font-family:'Courier New',monospace;
  font-size:13px; font-weight:bold; cursor:pointer; border-radius:4px;
  width:100%; margin-bottom:7px; letter-spacing:2px; background:transparent; text-transform:uppercase;
}
.btn-red { color:#ff3300; border-color:#ff3300; }
.btn-amber { color:#ffaa00; border-color:#ffaa00; }
.btn-red:active { background:#1a0000; }
.btn-amber:active { background:#1a0a00; }

/* LANDSCAPE */
@media (orientation:landscape) {
  body { padding:3px; }
  .bttf-panel { margin-bottom:3px; padding:4px 6px 3px; }
  .digit { font-size:clamp(18px,5vw,36px) !important; }
  .speed { font-size:clamp(20px,5vw,36px) !important; }
  .speed-box { padding:3px; margin-bottom:3px; }
  .countdown { margin:2px 0 3px; font-size:9px; }
  .panel-title { font-size:7px; padding:1px 0; margin-top:2px; }
  .btn { padding:12px 16px; margin-bottom:4px; }
}

/* MODAL */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:100; align-items:center; justify-content:center; }
.modal.open { display:flex; }
.modal-box { background:#1a0a00; border:2px solid #5a3a00; border-radius:8px; padding:20px; width:92%; max-width:380px; }
.modal-title { color:#ffaa00; font-size:12px; letter-spacing:3px; margin-bottom:16px; text-align:center; }
.form-row { display:flex; gap:8px; margin-bottom:10px; }
.form-group { flex:1; }
.form-group label { display:block; color:#666; font-size:9px; letter-spacing:1px; margin-bottom:3px; }
.form-group input, .form-group select { width:100%; background:#0d0500; border:1px solid #5a3a00; color:#ffaa00; font-family:'Courier New',monospace; font-size:14px; padding:8px; border-radius:4px; }
.modal-btns { display:flex; gap:8px; margin-top:14px; }
.modal-save { flex:1; background:#ff3300; color:#000; border:none; padding:14px; font-family:'Courier New',monospace; font-weight:bold; cursor:pointer; border-radius:4px; letter-spacing:2px; font-size:14px; }
.modal-cancel { flex:1; background:#333; color:#fff; border:none; padding:14px; font-family:'Courier New',monospace; cursor:pointer; border-radius:4px; font-size:14px; }

/* TIME TRAVEL OVERLAY */
#timeTravelOverlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  z-index:999; align-items:center; justify-content:center; flex-direction:column;
  pointer-events:none;
}
#timeTravelOverlay.active { display:flex; animation:overlayFlash 4s ease-in-out forwards; }
@keyframes overlayFlash {
  0%{background:rgba(255,255,255,0);}
  10%{background:rgba(255,255,255,0.95);}
  25%{background:rgba(255,50,0,0.4);}
  40%{background:rgba(255,255,255,0.95);}
  55%{background:rgba(0,255,68,0.3);}
  70%{background:rgba(255,255,255,0.95);}
  85%{background:rgba(255,170,0,0.3);}
  100%{background:rgba(255,255,255,0);}
}
#timeTravelText {
  font-size:clamp(20px,7vw,48px); font-weight:bold; color:#ff2200;
  text-shadow:0 0 20px #ff2200; letter-spacing:4px; text-align:center;
  animation:textPulse 0.3s ease-in-out infinite;
}
#timeTravelEmoji { font-size:clamp(36px,10vw,72px); margin-bottom:10px; animation:emojiSpin 0.5s linear infinite; }
@keyframes textPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
@keyframes emojiSpin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
.spinning .digit { animation:digitFlash 0.08s linear infinite !important; color:#fff !important; text-shadow:0 0 20px #fff !important; }
@keyframes digitFlash { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
</style>
</head>
<body>

<div class="speed-box">
  <div class="speed" id="speed">-- km/h</div>
  <div class="speed-label" id="speedLabel">Velocita GPS non disponibile</div>
</div>

<div class="countdown" id="countdown"></div>

<!-- DESTINATION TIME (rosso) -->
<div class="bttf-panel red">
  <div class="labels-row">
    <div class="label-cell"><span class="label-tag">MONTH</span></div>
    <div class="label-cell"><span class="label-tag">DAY</span></div>
    <div class="label-cell year-cell"><span class="label-tag">YEAR</span></div>
    <div class="label-cell ampm-cell"></div>
    <div class="label-cell small-cell"><span class="label-tag">HOUR</span></div>
    <div class="label-cell ampm-cell"></div>
    <div class="label-cell small-cell"><span class="label-tag">MIN</span></div>
  </div>
  <div class="display-row">
    <div class="digit-box"><span class="digit" id="dMonth">NOV</span></div>
    <div class="digit-box"><span class="digit" id="dDay">05</span></div>
    <div class="digit-box year-box"><span class="digit" id="dYear">1955</span></div>
    <div class="ampm-box">
      <div class="ampm-row"><div class="ampm-dot on" id="dAmDot"></div><span class="ampm-label">AM</span></div>
      <div class="ampm-row"><div class="ampm-dot off" id="dPmDot"></div><span class="ampm-label">PM</span></div>
    </div>
    <div class="digit-box small-box"><span class="digit" id="dHour">06</span></div>
    <div class="colon-sep"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <div class="digit-box small-box"><span class="digit" id="dMin">00</span></div>
  </div>
  <div class="panel-title">Destination Time</div>
</div>

<!-- PRESENT TIME (verde) -->
<div class="bttf-panel green">
  <div class="labels-row">
    <div class="label-cell"><span class="label-tag">MONTH</span></div>
    <div class="label-cell"><span class="label-tag">DAY</span></div>
    <div class="label-cell year-cell"><span class="label-tag">YEAR</span></div>
    <div class="label-cell ampm-cell"></div>
    <div class="label-cell small-cell"><span class="label-tag">HOUR</span></div>
    <div class="label-cell ampm-cell"></div>
    <div class="label-cell small-cell"><span class="label-tag">MIN</span></div>
  </div>
  <div class="display-row">
    <div class="digit-box"><span class="digit" id="pMonth">---</span></div>
    <div class="digit-box"><span class="digit" id="pDay">--</span></div>
    <div class="digit-box year-box"><span class="digit" id="pYear">----</span></div>
    <div class="ampm-box">
      <div class="ampm-row"><div class="ampm-dot off" id="pAmDot"></div><span class="ampm-label">AM</span></div>
      <div class="ampm-row"><div class="ampm-dot on" id="pPmDot"></div><span class="ampm-label">PM</span></div>
    </div>
    <div class="digit-box small-box"><span class="digit" id="pHour">--</span></div>
    <div class="colon-sep"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <div class="digit-box small-box"><span class="digit" id="pMin">--</span></div>
  </div>
  <div class="panel-title">Present Time</div>
</div>

<!-- LAST TIME DEPARTED (ambra) -->
<div class="bttf-panel amber">
  <div class="labels-row">
    <div class="label-cell"><span class="label-tag">MONTH</span></div>
    <div class="label-cell"><span class="label-tag">DAY</span></div>
    <div class="label-cell year-cell"><span class="label-tag">YEAR</span></div>
    <div class="label-cell ampm-cell"></div>
    <div class="label-cell small-cell"><span class="label-tag">HOUR</span></div>
    <div class="label-cell ampm-cell"></div>
    <div class="label-cell small-cell"><span class="label-tag">MIN</span></div>
  </div>
  <div class="display-row">
    <div class="digit-box"><span class="digit" id="lMonth">OCT</span></div>
    <div class="digit-box"><span class="digit" id="lDay">26</span></div>
    <div class="digit-box year-box"><span class="digit" id="lYear">1985</span></div>
    <div class="ampm-box">
      <div class="ampm-row"><div class="ampm-dot on" id="lAmDot"></div><span class="ampm-label">AM</span></div>
      <div class="ampm-row"><div class="ampm-dot off" id="lPmDot"></div><span class="ampm-label">PM</span></div>
    </div>
    <div class="digit-box small-box"><span class="digit" id="lHour">01</span></div>
    <div class="colon-sep"><div class="colon-dot"></div><div class="colon-dot"></div></div>
    <div class="digit-box small-box"><span class="digit" id="lMin">21</span></div>
  </div>
  <div class="panel-title">Last Time Departed</div>
</div>

<button class="btn btn-red" onclick="openModal('dest')">&#9889; Imposta DESTINATION TIME</button>
<button class="btn btn-amber" onclick="openModal('last')">&#128336; Imposta LAST TIME DEPARTED</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">IMPOSTA DATA</div>
    <div class="form-row">
      <div class="form-group">
        <label>MESE</label>
        <select id="inMonth">
          <option value="1">JAN</option><option value="2">FEB</option>
          <option value="3">MAR</option><option value="4">APR</option>
          <option value="5">MAY</option><option value="6">JUN</option>
          <option value="7">JUL</option><option value="8">AUG</option>
          <option value="9">SEP</option><option value="10">OCT</option>
          <option value="11">NOV</option><option value="12">DEC</option>
        </select>
      </div>
      <div class="form-group">
        <label>GIORNO</label>
        <input type="number" id="inDay" min="1" max="31" value="1">
      </div>
      <div class="form-group">
        <label>ANNO</label>
        <input type="number" id="inYear" min="1885" max="2085" value="1985">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>ORA (0-23)</label>
        <input type="number" id="inHour" min="0" max="23" value="0">
      </div>
      <div class="form-group">
        <label>MINUTI</label>
        <input type="number" id="inMin" min="0" max="59" value="0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">ANNULLA</button>
      <button class="modal-save" onclick="saveModal()">SALVA</button>
    </div>
  </div>
</div>

<!-- TIME TRAVEL OVERLAY -->
<div id="timeTravelOverlay">
  <div id="timeTravelEmoji">&#9889;</div>
  <div id="timeTravelText">VIAGGIO NEL TEMPO!</div>
</div>

<script>
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function pad(n){ return String(n).padStart(2,'0'); }

var dest = JSON.parse(localStorage.getItem('bttf_dest') || '{"m":11,"d":5,"y":1955,"h":6,"min":0}');
var last = JSON.parse(localStorage.getItem('bttf_last') || '{"m":10,"d":26,"y":1985,"h":1,"min":21}');
var editingWhich = 'dest';

function setPanel(prefix, data) {
  var h = data.h === 0 ? 12 : data.h > 12 ? data.h - 12 : data.h;
  var isAm = data.h < 12;
  document.getElementById(prefix+'Month').textContent = MONTHS[data.m-1];
  document.getElementById(prefix+'Day').textContent = pad(data.d);
  document.getElementById(prefix+'Year').textContent = data.y;
  document.getElementById(prefix+'Hour').textContent = pad(h);
  document.getElementById(prefix+'Min').textContent = pad(data.min);
  document.getElementById(prefix+'AmDot').className = 'ampm-dot ' + (isAm ? 'on' : 'off');
  document.getElementById(prefix+'PmDot').className = 'ampm-dot ' + (!isAm ? 'on' : 'off');
}

function updatePresent() {
  var now = new Date();
  setPanel('p', {m:now.getMonth()+1, d:now.getDate(), y:now.getFullYear(), h:now.getHours(), min:now.getMinutes()});
  var destDate = new Date(dest.y, dest.m-1, dest.d, dest.h, dest.min);
  var diff = destDate - now;
  var abs = Math.abs(diff);
  var days = Math.floor(abs/86400000);
  var hours = Math.floor((abs%86400000)/3600000);
  var mins = Math.floor((abs%3600000)/60000);
  if (diff > 0) document.getElementById('countdown').textContent = 'Mancano '+days+' giorni, '+hours+' ore e '+mins+' minuti alla destinazione';
  else if (diff < 0) document.getElementById('countdown').textContent = 'Destinazione superata di '+days+' giorni, '+hours+' ore e '+mins+' minuti';
  else document.getElementById('countdown').textContent = 'Sei arrivato alla destinazione!';
}

function openModal(which) {
  editingWhich = which;
  var data = which === 'dest' ? dest : last;
  document.getElementById('modalTitle').textContent = which === 'dest' ? 'DESTINATION TIME' : 'LAST TIME DEPARTED';
  document.getElementById('inMonth').value = data.m;
  document.getElementById('inDay').value = data.d;
  document.getElementById('inYear').value = data.y;
  document.getElementById('inHour').value = data.h;
  document.getElementById('inMin').value = data.min;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveModal() {
  var data = {
    m: parseInt(document.getElementById('inMonth').value),
    d: parseInt(document.getElementById('inDay').value),
    y: parseInt(document.getElementById('inYear').value),
    h: parseInt(document.getElementById('inHour').value),
    min: parseInt(document.getElementById('inMin').value)
  };
  if (editingWhich === 'dest') {
    dest = data;
    localStorage.setItem('bttf_dest', JSON.stringify(data));
    setPanel('d', data);
  } else {
    last = data;
    localStorage.setItem('bttf_last', JSON.stringify(data));
    setPanel('l', data);
  }
  closeModal();
  updatePresent();
}

// TIME TRAVEL ANIMATION
var timeTravelPlaying = false;
function triggerTimeTravel() {
  if (timeTravelPlaying) return;
  timeTravelPlaying = true;
  var overlay = document.getElementById('timeTravelOverlay');
  overlay.classList.add('active');
  var panels = document.querySelectorAll('.bttf-panel');
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var nums = ['00','11','22','33','44','55','66','77','88','99'];
  setTimeout(function() {
    panels.forEach(function(p){ p.classList.add('spinning'); });
    var digits = document.querySelectorAll('.digit');
    var count = 0;
    var interval = setInterval(function() {
      digits.forEach(function(d) {
        if (d.textContent.match(/[0-9]/)) d.textContent = nums[Math.floor(Math.random()*nums.length)];
        else d.textContent = months[Math.floor(Math.random()*months.length)];
      });
      count++;
      if (count > 20) {
        clearInterval(interval);
        panels.forEach(function(p){ p.classList.remove('spinning'); });
        setPanel('d', dest);
        setPanel('l', last);
        updatePresent();
      }
    }, 100);
  }, 300);
  setTimeout(function() {
    overlay.classList.remove('active');
    timeTravelPlaying = false;
  }, 4500);
}

// SCHERMO SEMPRE ACCESO
async function keepScreenOn() {
  try {
    if ('wakeLock' in navigator) {
      var wakeLock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async function() {
        if (document.visibilityState === 'visible') {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
    }
  } catch(e) {}
}
keepScreenOn();

// GPS
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(function(pos) {
    if (pos.coords.speed !== null) {
      var kmh = Math.round(pos.coords.speed * 3.6);
      document.getElementById('speed').textContent = kmh + ' km/h';
      if (kmh >= 88) {
        document.getElementById('speed').style.color = '#ff2200';
        document.getElementById('speedLabel').textContent = 'VIAGGIO NEL TEMPO IN CORSO!';
        document.getElementById('speedLabel').style.color = '#ff2200';
        triggerTimeTravel();
      } else if (kmh >= 70) {
        document.getElementById('speed').style.color = '#ffaa00';
        document.getElementById('speedLabel').textContent = 'Mancano '+(88-kmh)+' km/h alla destinazione temporale!';
        document.getElementById('speedLabel').style.color = '#ffaa00';
      } else {
        document.getElementById('speed').style.color = '#00ff44';
        document.getElementById('speedLabel').textContent = (88-kmh)+' km/h alla destinazione temporale';
        document.getElementById('speedLabel').style.color = '#ffb000';
      }
    }
  }, null, {enableHighAccuracy:true});
}

setPanel('d', dest);
setPanel('l', last);
updatePresent();
setInterval(updatePresent, 1000);
</script>
</body>
</html>
